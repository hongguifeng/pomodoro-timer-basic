<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>番茄钟</h1>
        <div id="timer">00:05</div>
        <div class="time-set">
            <label for="timeInput">设置时间 (分钟):</label>
            <input type="number" id="timeInput" min="1" max="60" value="25">
            <button id="setTimeButton">设置</button>
        </div>
        <button id="startButton">开始</button>
        <button id="resetButton">重置</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
